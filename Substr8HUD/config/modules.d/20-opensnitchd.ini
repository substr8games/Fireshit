[module]
id=network.firewall
title=OPENSNITCHD
command=if ! systemctl is-active --quiet opensnitchd.service; then echo 'OPENSNITCHD IS NOT ACTIVE'; echo; echo 'Start it outside the HUD:'; echo '  sudo systemctl enable --now opensnitchd.service'; echo; systemctl --no-pager --full status opensnitchd.service || true; while :; do sleep 3600; done; fi; systemctl --no-pager --full status opensnitchd.service || true; exec journalctl -n 200 -f -u opensnitchd.service --no-hostname -o short-precise
working_directory=
layout_slot=bottom-left-wide
bank_order=40
lifecycle=persistent
interactive=false
restart_policy=always
scrollback_lines=20000
requires=opensnitchd;systemctl;journalctl;sleep;
