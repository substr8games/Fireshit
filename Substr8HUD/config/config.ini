# SUBSTR8 HUD global user settings.
# Installed to $XDG_CONFIG_HOME/substr8-hud/config.ini on first install.
# Existing user files are preserved.

[hud]
placement=right

[layout.side]
console.tty-mirror=top-left:10
console.shared=top-right:10
logs.wayfire=top-right:20
resource.htop=bottom-left-wide:10
resource.btop=bottom-left-wide:20
resource.gpu=bottom-left-wide:30
network.firewall=bottom-left-wide:40
network.processes=bottom-left-wide:50
storage.io=bottom-left-wide:60

[layout.fullscreen]
console.tty-mirror=top-left:10
console.shared=top-center:10
logs.wayfire=top-right:10
resource.htop=bottom-left-wide:10
resource.btop=bottom-left-wide:20
resource.gpu=bottom-left-wide:30
network.firewall=bottom-right-wide:10
network.processes=bottom-right-wide:20
storage.io=bottom-right-wide:30
