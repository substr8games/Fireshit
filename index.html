<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="description" content="Fireshit public overview and complete reference guide for SUBSTR8 HUD, FrameTap, and Firemod.">
  <meta property="og:title" content="Fireshit — Overview and Reference Guide">
  <meta property="og:description" content="A handcrafted Wayfire utility suite for telemetry, capture, and unified settings access.">
  <meta property="og:type" content="website">

  <title>Fireshit — Overview and Reference Guide</title>
  <style>
    :root {
      --bg: #070a0d;
      --panel: #0f161d;
      --panel-2: #131d26;
      --line: #26333d;
      --line-strong: #3a4a57;
      --text: #e5eaee;
      --muted: #94a3ad;
      --orange: #f39a3f;
      --gold: #e2c57d;
      --cyan: #70d8ff;
      --tabs-height: 62px;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    button { font: inherit; }

    .document-tabs {
      position: relative;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: var(--tabs-height);
      padding: 8px 14px;
      border-bottom: 1px solid var(--line);
      background: rgba(7, 10, 13, 0.97);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.24);
    }

    .document-brand {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .document-brand strong {
      color: var(--gold);
      font-size: 15px;
      line-height: 1.1;
    }

    .document-brand span {
      color: var(--muted);
      font: 700 9px/1.2 "IBM Plex Mono", "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .tab-list {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: #090f14;
    }

    .tab-button {
      min-height: 36px;
      border: 1px solid transparent;
      border-radius: 3px;
      background: transparent;
      color: var(--muted);
      padding: 7px 13px;
      cursor: pointer;
      font-weight: 750;
      white-space: nowrap;
    }

    .tab-button:hover {
      color: var(--text);
      background: var(--panel);
      border-color: var(--line);
    }

    .tab-button:focus-visible {
      outline: none;
      color: var(--text);
      border-color: var(--cyan);
      box-shadow: 0 0 0 2px rgba(112, 216, 255, 0.14);
    }

    .tab-button[aria-selected="true"] {
      color: var(--gold);
      border-color: var(--orange);
      background: #17130e;
      box-shadow: inset 0 -2px 0 var(--orange);
    }

    .document-stage {
      position: relative;
      width: 100%;
      height: calc(100dvh - var(--tabs-height));
      min-height: 0;
      background: var(--bg);
    }

    .document-panel {
      position: absolute;
      inset: 0;
    }

    .document-panel[hidden] { display: none; }

    iframe {
      display: block;
      width: 100%;
      height: 100%;
      border: 0;
      background: var(--bg);
    }

    .loading {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      color: var(--muted);
      background: var(--bg);
      font: 700 11px/1.3 "IBM Plex Mono", "Cascadia Mono", "SFMono-Regular", Consolas, monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      pointer-events: none;
    }

    .document-panel.ready .loading { display: none; }

    @media (max-width: 650px) {
      :root { --tabs-height: 104px; }

      .document-tabs {
        align-items: stretch;
        flex-direction: column;
        justify-content: center;
        gap: 7px;
        padding: 8px 10px;
      }

      .document-brand {
        align-items: center;
        text-align: center;
      }

      .tab-list { width: 100%; }
      .tab-button { flex: 1 1 0; padding-inline: 8px; }
    }

    @media (prefers-reduced-motion: reduce) {
      * { scroll-behavior: auto !important; }
    }
  </style>
</head>

  <script>
    (() => {
      const pages = {
        copy: {
          tab: document.getElementById('tab-copy'),
          panel: document.getElementById('panel-copy'),
          frame: document.getElementById('frame-copy'),
          source: document.getElementById('copy-document')
        },
        reference: {
          tab: document.getElementById('tab-reference'),
          panel: document.getElementById('panel-reference'),
          frame: document.getElementById('frame-reference'),
          source: document.getElementById('reference-document')
        }
      };

      const decode = element => {
        const binary = atob(element.textContent.trim());
        const bytes = Uint8Array.from(binary, character => character.charCodeAt(0));
        return new TextDecoder().decode(bytes);
      };

      for (const page of Object.values(pages)) {
        page.frame.addEventListener('load', () => page.panel.classList.add('ready'), { once: true });
        page.frame.srcdoc = decode(page.source);
      }

      const normalizePage = value => value === 'reference' ? 'reference' : 'copy';

      function activatePage(name, options = {}) {
        const activeName = normalizePage(name);

        for (const [pageName, page] of Object.entries(pages)) {
          const active = pageName === activeName;
          page.tab.setAttribute('aria-selected', String(active));
          page.tab.tabIndex = active ? 0 : -1;
          page.panel.hidden = !active;
        }

        const hash = activeName === 'reference' ? '#reference' : '#overview';
        if (location.hash !== hash) history.replaceState(null, '', hash);
        document.title = activeName === 'reference'
          ? 'Fireshit — Reference Guide'
          : 'Fireshit — Overview and Reference Guide';

        if (options.focus) pages[activeName].tab.focus();
      }

      document.querySelector('.tab-list').addEventListener('click', event => {
        const button = event.target.closest('[data-page]');
        if (button) activatePage(button.dataset.page);
      });

      document.querySelector('.tab-list').addEventListener('keydown', event => {
        if (!['ArrowLeft', 'ArrowRight', 'Home', 'End'].includes(event.key)) return;
        event.preventDefault();
        const order = ['copy', 'reference'];
        const current = order.findIndex(name => pages[name].tab.getAttribute('aria-selected') === 'true');
        let next = current;
        if (event.key === 'ArrowLeft') next = (current - 1 + order.length) % order.length;
        if (event.key === 'ArrowRight') next = (current + 1) % order.length;
        if (event.key === 'Home') next = 0;
        if (event.key === 'End') next = order.length - 1;
        activatePage(order[next], { focus: true });
      });

      window.addEventListener('hashchange', () => {
        activatePage(location.hash === '#reference' ? 'reference' : 'copy');
      });

      activatePage(location.hash === '#reference' ? 'reference' : 'copy');
    })();
  </script>
